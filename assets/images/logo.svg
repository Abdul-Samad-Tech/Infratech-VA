<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow Background Square -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="#FFD700"/>
  
  <!-- IT Text -->
  <text x="50" y="65" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700" font-size="40" fill="#2D1B44">IT</text>
  
  <!-- Circuit Lines - Top Left -->
  <line x1="15" y1="25" x2="30" y2="25" stroke="#2D1B44" stroke-width="2" stroke-linecap="round"/>
  <circle cx="30" cy="25" r="3" fill="#2D1B44"/>
  
  <!-- Circuit Lines - Top Right -->
  <line x1="70" y1="25" x2="85" y2="25" stroke="#2D1B44" stroke-width="2" stroke-linecap="round"/>
  <circle cx="70" cy="25" r="3" fill="#2D1B44"/>
  
  <!-- Circuit Lines - Bottom Left -->
  <line x1="15" y1="75" x2="30" y2="75" stroke="#2D1B44" stroke-width="2" stroke-linecap="round"/>
  <circle cx="30" cy="75" r="3" fill="#2D1B44"/>
  
  <!-- Circuit Lines - Bottom Right -->
  <line x1="70" y1="75" x2="85" y2="75" stroke="#2D1B44" stroke-width="2" stroke-linecap="round"/>
  <circle cx="70" cy="75" r="3" fill="#2D1B44"/>
  
  <!-- Additional Circuit Details -->
  <line x1="30" y1="25" x2="30" y2="15" stroke="#2D1B44" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="25" x2="70" y2="15" stroke="#2D1B44" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="75" x2="30" y2="85" stroke="#2D1B44" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="75" x2="70" y2="85" stroke="#2D1B44" stroke-width="1.5" stroke-linecap="round"/>
</svg>
